<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hiromu Izuwa</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #19222d;
      --muted: #516170;
      --paper: #f8faf8;
      --line: #d5ddd7;
      --accent: #126a87;
      --leaf: #dcebd4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, var(--leaf), transparent 38%),
        var(--paper);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    }

    main {
      width: min(720px, calc(100% - 40px));
      min-height: 100vh;
      display: grid;
      align-content: center;
      gap: 20px;
      margin: 0 auto;
      padding: 48px 0;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      letter-spacing: 0;
    }

    h1 {
      font-size: 3.5rem;
      line-height: 1.05;
    }

    h2 {
      font-size: 1.2rem;
    }

    h3 {
      font-size: 1.05rem;
    }

    p,
    li {
      max-width: 42rem;
      margin: 0;
      color: var(--muted);
      font-size: 1.1rem;
      line-height: 1.7;
      letter-spacing: 0;
    }

    section {
      display: grid;
      gap: 10px;
    }

    ul {
      margin: 0;
      padding-left: 24px;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      padding-top: 8px;
    }

    a {
      color: var(--accent);
      font-weight: 600;
    }

    nav a {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 16px;
      background: rgba(255, 255, 255, 0.76);
      text-decoration: none;
    }

    @media (max-width: 560px) {
      h1 {
        font-size: 2.4rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Hiromu Izuwa</h1>
    <section>
      <p>
        iOS アプリを開発しています。
        このサイトは公開中のアプリ情報、サポート、広告認証情報の案内ページです。
      </p>
    </section>
    <section id="apps">
      <h2>Apps</h2>
      <h3>みんな NO 日本語</h3>
      <p>
        タイ語で日本語を学ぶためのクイズアプリです。
        みんなの日本語のレッスンごとに問題を選び、復習できます。
      </p>
    </section>
    <section id="support">
      <h2>サポート</h2>
      <p>
        アプリの不具合、ご意見、機能のご要望は
        <a href="mailto:cr8youme@outlook.com">cr8youme@outlook.com</a>
        までご連絡ください。
      </p>
    </section>
    <nav aria-label="Site links">
      <a href="./app-ads.txt">app-ads.txt</a>
    </nav>
  </main>
</body>
</html>
